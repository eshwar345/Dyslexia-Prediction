<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Form</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-image: url('../static/images/pic11.jpg');
    background-size: cover; /* Ensure the background covers the entire area */
    background-position: center; /* Center the background image */
    height: 100vh; /* Make sure the body takes the full height of the viewport */
    overflow: hidden; /* Optional: Prevent scrolling if content overflows */
}
        .navbar {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 30px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding-left: 50%;
            display: flex;
            align-items: center;
        }
        .navbar li {
            position: relative; /* Required for dropdown positioning */
        }
        .navbar li a {
            color: white;
            padding-left: 6rem;
            list-style-type: none;
            font-size: 1.5rem;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        .navbar li a:hover {
            color: rgb(9, 240, 240);
            transform: scale(1.2);
            animation: dazzling 0.5s infinite;
        }
        @keyframes dazzling {
            0%, 100% {
                text-shadow: 0 0 5px rgb(102, 253, 228), 0 0 10px rgb(102, 253, 228), 0 0 15px rgb(102, 253, 228);
            }
            50% {
                text-shadow: 0 0 20px rgb(102, 253, 228), 0 0 30px rgb(102, 253, 228), 0 0 40px rgb(102, 253, 228);
            }
        }
        .navbar input[type="text"] {
            padding: 5px;
            border: none;
            border-radius: 5px;
        }
        .dropdown {
            display: none; /* Hidden by default */
            position: absolute; /* Position it below the dropdown */
            background-color: rgba(0, 0, 0, 0.8);
            min-width: 160px; /* Set a minimum width */
            z-index: 1;
        }
        .dropdown a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
        }
        .dropdown a:hover {
            background-color: rgb(9, 240, 240);
        }
        .navbar li:hover .dropdown {
            display: block; /* Show dropdown on hover */
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10rem;
        }
        .card {
            width: 500px;
            margin: 15px;
            padding: 30px;
            border-radius: 10px;
        }
        .card:hover {
            box-shadow: 0 4px 8px white;
        }
        .info-card {
            background-color: white;
        }
        .info-card h2 {
            color: rgb(26, 129, 72);
        }
        .input-card {
            background-color: rgba(24, 24, 24, 0.8);
            color: white;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: transparent;
            color: white;
            outline: none;
            border-bottom: 0.5px solid rgb(9, 240, 240);
        }
        button {
            padding: 20px;
            background-color: rgb(71, 234, 255);
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 2rem;
        }
        button:hover {
            background-color: rgb(3, 51, 51);
            color: white;
        }
        @media screen and (max-width: 600px) {
            .navbar li a {
                padding-left: 2rem;
            }
            .container {
                display: block;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li>
                <a href="/input">Input</a>
                <div class="dropdown">
                    <a href="/input_excel" class="active">Excel</a>
                    <a href="/input">Manual</a>
                </div>
            </li>
            <li><a href="#">Charts</a></li>
            <li><a href="#">Performance</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="card info-card">
            <h2>Input Information</h2>
            <p>This section allows you to upload your data in an Excel file format.</p>
        </div>
        <div class="card input-card">
            <h2>Upload Excel File</h2>
            <form id="inputForm" action="/result2" method="post" enctype="multipart/form-data">
                <input type="file" accept=".xls,.xlsx,.csv" name="file" required>
                <button type="submit">Upload</button>
            </form>
        </div>
    </div>
</body>
</html>
